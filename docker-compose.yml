version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: liquidity-postgres

    environment:
      POSTGRES_DB: liquiditydb
      POSTGRES_USER: liquidity_user
      POSTGRES_PASSWORD: liquidity_pass

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres-data: