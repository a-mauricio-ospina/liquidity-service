spring:
  application:
    name: liquidity-service

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health, info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: liquidity-service
    description: Citizens Banking Liquidity Service
    version: 1.0.0

logging:
  level:
    com.citizens.banking: INFO
    org.springframework.web: WARN
