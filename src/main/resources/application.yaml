spring:
  application:
    name: liquidity-service

  datasource:
    url: jdbc:postgresql://localhost:5432/liquiditydb
    username: liquidity_user
    password: liquidity_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health, info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: liquidity-service
    description: Citizens Banking Liquidity Service
    version: 1.0.0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
  paths-to-exclude: /actuator/**

logging:
  level:
    com.citizens.banking: INFO
    org.springframework.web: WARN
    org.springframework.boot.actuate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-NO_ID}] %-5level %logger{36} - %msg%n"
